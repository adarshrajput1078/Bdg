<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>DEV PANNEL | QUANTUM ENGINE</title>
    
    <!-- High-End Corporate & Terminal Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

    <style>
        /* ==========================================================================
           1. STEALTH & LUXURY VARIABLES
           ========================================================================== */
        :root { 
            --accent: #d4af37; /* Luxury Muted Gold */
            --bg-dark: #000000; 
            --panel-bg: #050505;
            --border-color: #1a1a1a;
            
            --success: #00e676; /* Sharp Tech Green */
            --danger: #ff2a55; /* Crisp Red */
            
            --text-main: #ffffff;
            --text-muted: #666666;
            
            --font-ui: 'Inter', sans-serif;
            --font-data: 'Space Mono', monospace;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent;}
        body, html { background-color: var(--bg-dark); font-family: var(--font-ui); overflow: hidden; height: 100vh; width: 100vw; display: flex; flex-direction: column;}
        
        /* ==========================================================================
           2. 15 / 85 FIXED SCREEN SPLIT (MINIMALIST)
           ========================================================================== */
        /* Top Console (Strict 15%, No Bulky Glows) */
        .stealth-console { 
            width: 100%; height: 15vh; min-height: 120px; 
            background: var(--panel-bg); border-bottom: 1px solid var(--border-color); 
            z-index: 10; position: relative; display: flex; flex-direction: column;
        }

        /* Subtle noise texture, not distracting lines */
        .console-noise {
            position: absolute; inset: 0; pointer-events: none; z-index: 0; opacity: 0.05;
            background-image: url('data:image/svg+xml,%3Csvg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"%3E%3Cfilter id="noiseFilter"%3E%3CfeTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/%3E%3C/filter%3E%3Crect width="100%25" height="100%25" filter="url(%23noiseFilter)"/%3E%3C/svg%3E');
        }

        /* Bottom Game (85%) */
        .game-section { width: 100%; flex: 1; position: relative; z-index: 1; background: #000; }
        .game-iframe { width: 100%; height: 100%; border: none; }

        /* ==========================================================================
           3. AUTHENTICATION & LOGIN (BANKING-STYLE SECURITY)
           ========================================================================== */
        .auth-container {
            position: absolute; inset: 0; z-index: 20; background: rgba(0,0,0,0.98);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            padding: 10px 20px; text-align: center;
        }

        .auth-brand { font-family: var(--font-ui); font-size: 16px; font-weight: 900; color: #fff; letter-spacing: 4px; margin-bottom: 4px; text-transform: uppercase;}
        .auth-brand span { color: var(--accent); }
        .auth-divider { width: 40px; height: 2px; background: var(--accent); margin-bottom: 15px;}
        
        .uid-input-wrapper { display: flex; width: 100%; max-width: 400px; gap: 0;}
        .uid-input { 
            flex: 1; background: #0a0a0a; border: 1px solid var(--border-color); border-right: none; 
            color: #fff; font-family: var(--font-data); font-size: 13px; text-align: center; 
            padding: 10px; outline: none; letter-spacing: 2px; border-radius: 2px 0 0 2px;
        }
        .uid-input:focus { border-color: #333; background: #0f0f0f;}
        
        .btn-auth { 
            background: #fff; color: #000; border: none; border-radius: 0 2px 2px 0; 
            padding: 0 20px; font-family: var(--font-ui); font-weight: 800; font-size: 11px; 
            cursor: pointer; letter-spacing: 1px; transition: 0.2s;
        }
        .btn-auth:active { background: #ddd; }
        
        .auth-msg { font-family: var(--font-data); font-size: 9px; color: var(--accent); margin-top: 10px; text-transform: uppercase; letter-spacing: 1px;}
        .auth-sub-msg { font-family: var(--font-ui); font-size: 10px; color: var(--text-muted); margin-top: 4px;}

        /* ==========================================================================
           4. MATURE / PROFESSIONAL HUD
           ========================================================================== */
        .active-console {
            display: none; flex: 1; position: relative; z-index: 5;
            padding: 8px 12px; flex-direction: column; justify-content: space-between;
        }

        .top-row { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-color); padding-bottom: 5px;}
        
        .sys-id { font-family: var(--font-ui); font-size: 10px; color: var(--text-muted); font-weight: 600; letter-spacing: 2px;}
        .sys-id span { color: #fff;}

        .win-counter { display: flex; align-items: center; gap: 8px; font-family: var(--font-data); font-size: 10px;}
        .w-lbl { color: var(--text-muted); text-transform: uppercase;}
        .w-val { color: var(--success); font-weight: 700; background: rgba(0,230,118,0.1); padding: 1px 6px; border-radius: 2px;}

        /* Main Dashboard Grid */
        .main-row { display: flex; justify-content: space-between; align-items: center; flex: 1; gap: 15px;}

        /* Left: Target & Timer */
        .data-block { display: flex; flex-direction: column;}
        .d-lbl { font-family: var(--font-ui); font-size: 8px; color: var(--text-muted); text-transform: uppercase; font-weight: 800; letter-spacing: 1px;}
        .d-val { font-family: var(--font-data); font-size: 16px; color: #fff; font-weight: 700; line-height: 1.2;}
        .d-sub { font-family: var(--font-data); font-size: 9px; color: var(--accent); }

        /* Center: Cryptographic Display */
        .crypto-core { 
            flex: 1; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: #0a0a0a; border: 1px solid var(--border-color); border-radius: 2px; position: relative;
        }

        /* Idle State */
        .state-idle { font-family: var(--font-data); font-size: 9px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px;}
        
        /* Cryptographic Decryption VFX */
        .state-decoding { display: none; font-family: var(--font-data); font-size: 14px; color: var(--text-main); font-weight: 700; letter-spacing: 3px; opacity: 0.8;}
        
        /* Final Result */
        .state-result { display: none; flex-direction: column; align-items: center; justify-content: center; width: 100%;}
        .r-title { font-family: var(--font-ui); font-size: 24px; font-weight: 900; line-height: 1; text-transform: uppercase; letter-spacing: 2px;}
        .r-hash { font-family: var(--font-data); font-size: 11px; color: var(--text-muted); margin-top: 4px; letter-spacing: 1px;}
        .r-hash span { color: #fff; font-weight: 700;}

        /* Premium Colors */
        .txt-big { color: var(--accent); }
        .txt-small { color: #fff; }

        /* Professional Verification Stamp */
        .verify-stamp {
            display: none; font-family: var(--font-data); font-size: 9px; font-weight: 700; margin-top: 5px;
            padding: 3px 8px; border-radius: 2px; text-transform: uppercase; letter-spacing: 1px;
            border: 1px solid;
        }
        .v-pass { color: var(--success); border-color: rgba(0,230,118,0.3); background: rgba(0,230,118,0.05); }
        .v-fail { color: var(--danger); border-color: rgba(255,42,85,0.3); background: rgba(255,42,85,0.05); }

        /* Right: Trigger */
        .action-block { display: flex; flex-direction: column; align-items: flex-end; justify-content: center; width: 90px;}
        .btn-exec { 
            background: #fff; color: #000; border: none; border-radius: 2px; 
            width: 100%; padding: 12px 0; font-family: var(--font-ui); font-weight: 900; font-size: 10px; cursor: pointer; 
            text-transform: uppercase; letter-spacing: 1px; transition: 0.1s;
        }
        .btn-exec:active { background: #ccc; }
        .btn-exec:disabled { background: #1a1a1a; color: #444; cursor: not-allowed;}

    </style>
</head>
<body>

    <!-- 1. COMPACT MATURE CONSOLE (15%) -->
    <div class="stealth-console" id="hackConsole">
        <div class="console-noise"></div>

        <!-- AUTHENTICATION ROOM (Dark Web Style) -->
        <div class="auth-container" id="authLayer">
            <!-- BRANDING UPDATED HERE -->
            <div class="auth-brand">DEV <span>PANNEL</span></div>
            <div class="auth-divider"></div>
            
            <div id="authInputGroup" class="uid-input-wrapper">
                <input type="number" id="uidInput" class="uid-input" placeholder="INPUT NEW UID">
                <button class="btn-auth" id="submitUidBtn">VERIFY</button>
            </div>
            
            <div class="auth-msg" id="authMsg">DEPOSIT AUTHENTICATION REQUIRED</div>
            <div class="auth-sub-msg" id="authSubMsg">Clearance takes approx 30-60 mins post-deposit.</div>
        </div>

        <!-- ACTIVE SYSTEM HUD -->
        <div class="active-console" id="activeLayer">
            
            <!-- Header -->
            <div class="top-row">
                <!-- BRANDING UPDATED HERE -->
                <div class="sys-id">SYSTEM: <span>DEV PANNEL v6.0</span></div>
                <div class="win-counter">
                    <span class="w-lbl">VERIFIED HITS</span>
                    <span class="w-val" id="statW">0</span>
                </div>
            </div>

            <!-- Terminal Row -->
            <div class="main-row">
                
                <!-- Target & Sync Data -->
                <div class="data-block">
                    <div class="d-lbl">TGT ISSUE</div>
                    <div class="d-sub" id="periodBadge">----</div>
                    <div class="d-lbl" style="margin-top:2px;">SYS CLK</div>
                    <div class="d-val" id="timerBadge">00:00</div>
                </div>

                <!-- Cryptographic Engine -->
                <div class="crypto-core">
                    
                    <!-- State 1: Standby -->
                    <div class="state-idle" id="uiIdle">AWAITING TRIGGER</div>
                    
                    <!-- State 2: Hex Decryption -->
                    <div class="state-decoding" id="uiDecoding">0x00000000</div>
                    
                    <!-- State 3: Final Render (LOCKED FOR SCREENSHOT) -->
                    <div class="state-result" id="uiResult">
                        <div class="r-title" id="predSizeVal">BIG</div>
                        <div class="r-hash">PRB: <span id="predNumVal">7, 9</span></div>
                        
                        <!-- State 4: Win/Loss Stamp -->
                        <div class="verify-stamp" id="winStampText">PASS: MATCH [7]</div>
                    </div>

                </div>

                <!-- Execution -->
                <div class="action-block">
                    <button class="btn-exec" id="analyzeBtn" disabled>EXECUTE</button>
                </div>
            </div>

        </div>
    </div>

    <!-- 2. GAME FRAME (85%) -->
    <div class="game-section">
        <iframe class="game-iframe" id="gameIframe" src="https://sikkim.com"></iframe>
    </div>

    <!-- ==========================================================================
         9. ALGORITHM & CORE LOGIC
         ========================================================================== -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, set, update, get, onValue } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        // FIREBASE LINK
        const firebaseConfig = { apiKey: "AIzaSyBNj71akpefcfEtn-SQfAcx-Pgwi8sUosg", authDomain: "teamdev-88676.firebaseapp.com", databaseURL: "https://teamdev-88676-default-rtdb.asia-southeast1.firebasedatabase.app", projectId: "teamdev-88676" };
        const app = initializeApp(firebaseConfig); const database = getDatabase(app);
        window.API_URL = "https://draw.ar-lottery01.com/WinGo/WinGo_1M/GetHistoryIssuePage.json"; 

        let AppState = { 
            isApproved: false, 
            internalPeriod: null,     
            displayedPeriod: null,    
            activePred: null, 
            evalPeriod: null, 
            fetchingLock: false,
            godMode: "AUTO"
        };
        let winCount = 0;

        onValue(ref(database, 'systemConfig/links/gameUrl'), (s) => { if(s.exists() && s.val() !== "") document.getElementById('gameIframe').src = s.val(); });
        onValue(ref(database, 'server/override/size'), (s) => { if(s.exists()) AppState.godMode = s.val(); });

        // --- AUTHENTICATION (MATURE BANKING STYLE) ---
        function getHardwareID() {
            let token = localStorage.getItem('dev_v60_hwid');
            if(!token) { token = 'HW-' + Math.random().toString(36).substr(2, 12).toUpperCase(); localStorage.setItem('dev_v60_hwid', token); }
            return token;
        }
        const HARDWARE_ID = getHardwareID();

        document.getElementById('submitUidBtn').addEventListener('click', async () => {
            const uid = document.getElementById('uidInput').value.trim();
            const btn = document.getElementById('submitUidBtn');
            const msg = document.getElementById('authMsg');
            const subMsg = document.getElementById('authSubMsg');
            
            if(!uid || uid.length < 5) { msg.innerText = "ERR: INVALID FORMAT"; msg.style.color = "var(--danger)"; return; }
            
            btn.disabled = true; btn.innerText = "...";
            msg.innerText = "ESTABLISHING SECURE LINK..."; msg.style.color = "#fff";

            try {
                const snap = await get(ref(database, `live_uids/${uid}`));
                if(!snap.exists()) { 
                    await set(ref(database, `live_uids/${uid}`), { uid: uid, status: "PENDING", requestTime: Date.now() }); 
                }

                document.getElementById('authInputGroup').style.display = 'none';
                msg.innerText = "STATUS: PENDING CLEARANCE"; msg.style.color = "var(--accent)";
                subMsg.innerText = "System admin reviewing deposit logs. ETA: 30-60m.";
                initApprovalPipeline(uid);
            } catch(e) { btn.disabled = false; btn.innerText = "VERIFY"; msg.innerText = "CONNECTION REFUSED"; msg.style.color = "var(--danger)"; }
        });

        function initApprovalPipeline(uid) {
            onValue(ref(database, `live_uids/${uid}`), (snapshot) => {
                if(snapshot.exists()) {
                    const data = snapshot.val();
                    const msg = document.getElementById('authMsg');
                    const subMsg = document.getElementById('authSubMsg');
                    const inputGroup = document.getElementById('authInputGroup');

                    if(data.status === "ACTIVE") {
                        AppState.isApproved = true;
                        document.getElementById('authLayer').style.display = 'none';
                        document.getElementById('activeLayer').style.display = 'flex';
                        if(!AppState.engineStarted) { triggerDecryptor(); AppState.engineStarted = true; }
                    } 
                    else if(data.status === "REJECTED" || data.status === "BANNED") {
                        AppState.isApproved = false;
                        document.getElementById('authLayer').style.display = 'flex';
                        document.getElementById('activeLayer').style.display = 'none';
                        inputGroup.style.display = 'flex';
                        document.getElementById('submitUidBtn').disabled = false;
                        document.getElementById('submitUidBtn').innerText = "RETRY";
                        msg.innerText = "ACCESS DENIED"; msg.style.color = "var(--danger)";
                        subMsg.innerText = (data.customMsg && data.customMsg.text) ? `LOG: ${data.customMsg.text}` : "Deposit criteria not met. Please deposit required amount.";
                    }
                }
            });
        }

        // --- CORE MATH LOGIC ---
        function executePredictionHash(period) {
            let raw = period.replace(/[^0-9]/g, ''); if(raw.length < 8) raw = "20260630100010538";
            let deltaSum = raw.split('').map(Number).reduce((x, y) => x + y, 0);
            let resultKey = (deltaSum * 8374) % 100;
            
            let sizeText = resultKey > 49 ? "BIG" : "SMALL";
            let pool = sizeText === "BIG" ? [5,6,7,8,9] : [0,1,2,3,4];
            let cssStyle = sizeText === "BIG" ? "txt-big" : "txt-small";
            
            return { sizeText, num1: pool[resultKey%5], num2: pool[(resultKey+1)%5], cssStyle };
        }

        // --- BACKGROUND SYNC API ---
        async function runDataPolling() {
            if(!AppState.isApproved || AppState.fetchingLock) return;
            AppState.fetchingLock = true;
            try {
                const response = await fetch(`${window.API_URL}?ts=${Date.now()}`, { cache: 'no-store' }); 
                const streamData = await response.json();
                const nodeDraw = streamData.data.list[0];
                const forwardPeriod = (BigInt(nodeDraw.issueNumber) + 1n).toString();
                
                AppState.internalPeriod = forwardPeriod;

                // WIN/LOSS EVALUATION
                if(AppState.evalPeriod === nodeDraw.issueNumber && AppState.activePred) {
                    let realNum = parseInt(nodeDraw.number);
                    let realSize = realNum >= 5 ? "BIG" : "SMALL";
                    let targetWin = (realSize === AppState.activePred.sizeText);

                    if(targetWin) { winCount++; document.getElementById('statW').innerText = winCount; }
                    
                    let stampNode = document.getElementById('winStampText');
                    stampNode.innerText = targetWin ? `PASS: MATCH [${realNum}]` : `FAIL: OUT [${realNum}]`;
                    stampNode.className = `verify-stamp ${targetWin ? 'v-pass' : 'v-fail'}`;
                    stampNode.style.display = 'block';
                    
                    AppState.evalPeriod = null; 
                }

                if(AppState.displayedPeriod !== AppState.internalPeriod) {
                    const actionBtn = document.getElementById('analyzeBtn');
                    actionBtn.disabled = false; actionBtn.innerText = "EXECUTE"; 
                    document.getElementById('periodBadge').innerText = AppState.internalPeriod.slice(-4);
                }

            } catch(e) {} finally { AppState.fetchingLock = false; setTimeout(runDataPolling, 3000); }
        }

        // --- MANUAL TRIGGER & CRYPTO DECODING VFX ---
        document.getElementById('analyzeBtn').addEventListener('click', () => {
            if(!AppState.internalPeriod) return; 
            
            AppState.displayedPeriod = AppState.internalPeriod;
            AppState.evalPeriod = AppState.displayedPeriod;
            
            if(AppState.godMode !== "AUTO") {
                AppState.activePred = AppState.godMode === "SKIP" ? { sizeText: "SKIP", num1: 0, num2: 0, cssStyle: "txt-small" } : { sizeText: AppState.godMode, num1: AppState.godMode === "BIG" ? 7 : 2, num2: AppState.godMode === "BIG" ? 9 : 4, cssStyle: AppState.godMode === "BIG" ? "txt-big" : "txt-small" };
            } else { 
                AppState.activePred = executePredictionHash(AppState.displayedPeriod); 
            }

            const actionBtn = document.getElementById('analyzeBtn');
            actionBtn.disabled = true; actionBtn.innerText = "BUSY..."; 
            
            document.getElementById('winStampText').style.display = 'none';
            document.getElementById('uiIdle').style.display = 'none';
            document.getElementById('uiResult').style.display = 'none';
            
            const decoder = document.getElementById('uiDecoding');
            decoder.style.display = 'block';
            
            // Hexadecimal Cipher VFX
            let hexChars = "0123456789ABCDEF";
            let decIntv = setInterval(() => {
                let hexStr = "0x";
                for(let i=0; i<8; i++) hexStr += hexChars.charAt(Math.floor(Math.random() * hexChars.length));
                decoder.innerText = hexStr;
            }, 60);
            
            setTimeout(() => {
                clearInterval(decIntv);
                decoder.style.display = 'none';
                
                const sNode = document.getElementById('predSizeVal');
                const nNode = document.getElementById('predNumVal');
                
                sNode.innerText = AppState.activePred.sizeText;
                sNode.className = `r-title ${AppState.activePred.cssStyle}`;
                
                if(AppState.activePred.sizeText === "SKIP") {
                    nNode.innerText = "VOLATILE";
                } else {
                    nNode.innerText = `${AppState.activePred.num1}, ${AppState.activePred.num2}`;
                }
                
                document.getElementById('uiResult').style.display = 'flex';
            }, 1200); 
        });

        // --- 500MS FAST TIMER ---
        function triggerConsoleClock() {
            setInterval(() => {
                let ticks = 60 - new Date().getSeconds(); 
                if(ticks === 60) ticks = 0;
                document.getElementById('timerBadge').innerText = `00:${ticks.toString().padStart(2,'0')}`;
            }, 500);
        }

        function triggerDecryptor() { 
            runDataPolling(); 
            triggerConsoleClock(); 
        }
    </script>
</body>
</html>
