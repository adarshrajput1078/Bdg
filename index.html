<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>NSE AMIR • COMPACT BLUE VIP</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@600;700&family=JetBrains+Mono:wght@700&display=swap');
  
  * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; }
  body { background: #000; overflow: hidden; height: 100vh; width: 100vw; font-family: 'Rajdhani', sans-serif; }

  .game-iframe { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; border: none; z-index: 1; background: #010409; }

  /* --- COMPACT MOD MENU CONTAINER (SIZE REDUCED TO ~60%) --- */
  .mod-menu {
    position: fixed; top: 15%; left: 5%; 
    width: 180px; /* SHRUNK FROM 260px to 180px */
    background: #010409; border-radius: 12px; border: 2px solid var(--theme-color, #0052d4);
    box-shadow: 0 10px 30px rgba(0,0,0,0.9), 0 0 20px var(--theme-glow, rgba(0, 168, 255, 0.4)), inset 0 0 10px rgba(0,0,0,0.8);
    z-index: 9999; display: flex; flex-direction: column; overflow: hidden;
    transition: box-shadow 0.4s ease, border-color 0.4s ease;
  }

  .mod-menu::after {
    content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    background: linear-gradient(rgba(255,255,255,0) 50%, rgba(0,0,0,0.2) 50%);
    background-size: 100% 3px; z-index: 10; pointer-events: none; opacity: 0.4;
  }

  /* --- HEADER --- */
  .header {
    background: #010409; padding: 8px 10px; cursor: grab; touch-action: none;
    display: flex; justify-content: space-between; align-items: center;
    border-bottom: 2px solid var(--theme-color, #003a8c); position: relative; z-index: 11;
  }
  .header:active { cursor: grabbing; }
  
  .brand-title {
    font-family: 'Orbitron', sans-serif; font-size: 0.75rem; font-weight: 900;
    color: #00e5ff; text-transform: uppercase; letter-spacing: 0.5px;
    text-shadow: 0 0 8px rgba(0, 229, 255, 0.6); display: flex; align-items: center; gap: 5px;
  }
  .brand-title span { color: #fff; text-shadow: 0 0 8px rgba(255,255,255,0.5); }
  .icon-btn { color: var(--theme-color, #00a8ff); font-size: 0.85rem; }

  /* --- VIEW CONTAINERS --- */
  .view-container { display: none; flex-direction: column; width: 100%; position: relative; z-index: 11; }
  .view-container.active { display: flex; animation: fadeIn 0.3s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }

  /* =========================================
     1. AUTHENTICATION VIEW
     ========================================= */
  .auth-view { padding: 20px 10px; align-items: center; text-align: center; }
  .terminal-text { font-family: 'JetBrains Mono', monospace; font-size: 0.6rem; color: #00e5ff; margin-bottom: 15px; text-align: left; width: 100%; min-height: 35px; text-shadow: 0 0 5px #00e5ff; }
  
  .uid-input {
    width: 100%; background: #000; border: 1.5px solid #0052d4; color: #00e5ff; padding: 8px; border-radius: 6px;
    font-family: 'JetBrains Mono', monospace; font-size: 0.75rem; text-align: center; margin-bottom: 12px; outline: none;
    box-shadow: inset 0 0 8px rgba(0, 229, 255, 0.1); transition: 0.3s;
  }
  .uid-input:focus { border-color: #00e5ff; box-shadow: inset 0 0 12px rgba(0, 229, 255, 0.3), 0 0 8px rgba(0, 229, 255, 0.3); }
  
  .btn-login {
    width: 100%; background: linear-gradient(90deg, #0052d4, #00a8ff); color: #fff; border: none; padding: 8px;
    font-family: 'Orbitron', sans-serif; font-size: 0.7rem; font-weight: 900; border-radius: 6px; cursor: pointer;
    box-shadow: 0 0 12px rgba(0, 168, 255, 0.6); position: relative;
  }
  .btn-login:active { transform: scale(0.96); }
  .auth-msg { font-family: 'JetBrains Mono', monospace; font-size: 0.55rem; font-weight: bold; color: #ff3366; margin-top: 10px; height: 12px; }

  /* =========================================
     2. MAIN HACK VIEW
     ========================================= */
  .status-bar {
    display: flex; justify-content: space-between; align-items: center; padding: 4px 10px;
    background: #010814; border-bottom: 1px solid rgba(255,255,255,0.05);
  }
  .status-item { font-family: 'JetBrains Mono', monospace; font-size: 0.45rem; font-weight: 700; color: #00a8ff; display: flex; align-items: center; gap: 3px; }
  .live-dot { width: 5px; height: 5px; background: #00e5ff; border-radius: 50%; animation: blink 1s infinite; box-shadow: 0 0 5px #00e5ff; }
  @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

  .main-display {
    padding: 15px 10px; position: relative;
    background-image: linear-gradient(var(--grid-color, rgba(0, 168, 255, 0.15)) 1px, transparent 1px), linear-gradient(90deg, var(--grid-color, rgba(0, 168, 255, 0.15)) 1px, transparent 1px);
    background-size: 15px 15px; background-position: center;
    display: flex; flex-direction: column; align-items: center; gap: 12px; transition: background-image 0.4s ease;
  }

  /* --- COMPACT CIRCLES --- */
  .circle-row { display: flex; justify-content: center; gap: 15px; width: 100%; }
  
  .circle-wrap { position: relative; width: 45px; height: 45px; display: flex; justify-content: center; align-items: center; }
  .circle-wrap::before {
    content: ''; position: absolute; width: 110%; height: 110%; border-radius: 50%;
    border: 1.5px dashed var(--glow-color, #00e5ff); opacity: 0.6; animation: spin 3s linear infinite;
  }
  @keyframes spin { 100% { transform: rotate(360deg); } }

  .circle {
    width: 100%; height: 100%; border-radius: 50%;
    background: radial-gradient(circle, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.5) 100%);
    border: 2px solid var(--glow-color, #00e5ff);
    box-shadow: 0 0 12px var(--glow-color, #00e5ff), inset 0 0 8px var(--glow-color, #00e5ff);
    display: flex; justify-content: center; align-items: center; z-index: 2; transition: all 0.3s ease;
  }
  .circle-num { font-family: 'Orbitron', sans-serif; font-size: 1.3rem; font-weight: 900; color: #fff; text-shadow: 0 0 8px var(--glow-color, #00e5ff); transition: filter 0.1s; }
  
  .motion-blur { filter: blur(2px); transform: scale(1.05); color: var(--glow-color); }

  /* --- COMPACT PILL & SEQ --- */
  .size-pill {
    background: #010409; border: 1.5px solid var(--glow-color, #00e5ff); border-radius: 15px; padding: 4px 18px;
    display: flex; align-items: center; gap: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.5), inset 0 0 6px var(--glow-color, #00e5ff);
    transition: all 0.3s ease;
  }
  .size-pill .dot { width: 5px; height: 5px; background: var(--glow-color, #00e5ff); border-radius: 50%; box-shadow: 0 0 4px var(--glow-color, #00e5ff); }
  .size-text { font-family: 'Orbitron', sans-serif; font-size: 0.75rem; font-weight: 900; color: #fff; letter-spacing: 0.5px; text-shadow: 0 0 4px var(--glow-color, #00e5ff); }

  .seq-box {
    background: rgba(0,0,0,0.8); border: 1px solid var(--theme-color, #003a8c); border-radius: 15px; padding: 4px 12px;
    font-family: 'JetBrains Mono', monospace; font-size: 0.55rem; color: #00a8ff; font-weight: 700; letter-spacing: 1px;
  }
  .seq-box span { color: #fff; }

  /* --- BOTTOM BUTTONS --- */
  .btn-row { display: flex; width: 100%; padding: 10px; gap: 8px; background: #010814; border-top: 1px solid rgba(255,255,255,0.05); }
  .btn { flex: 1; padding: 8px; border-radius: 6px; font-family: 'Orbitron', sans-serif; font-size: 0.65rem; font-weight: 900; letter-spacing: 0.5px; cursor: pointer; border: none; transition: 0.1s; }
  .btn:active { transform: scale(0.92); }
  
  .btn-again { background: linear-gradient(90deg, #0052d4, #00a8ff); color: #fff; box-shadow: 0 0 12px rgba(0, 168, 255, 0.5), inset 0 0 5px rgba(255,255,255,0.3); }
  .btn-hide { background: #010b1a; color: #00a8ff; border: 1.5px solid #0052d4; }

  /* --- FLOATING LOGO (COMPACT) --- */
  .floating-logo {
    position: fixed; top: 15%; left: 10px; width: 35px; height: 35px;
    background: #010409; border: 1.5px solid #00a8ff; border-radius: 8px;
    display: none; justify-content: center; align-items: center; z-index: 10000; cursor: grab;
    box-shadow: 0 0 12px rgba(0, 168, 255, 0.4); touch-action: none;
  }
  .floating-logo span { font-family: 'Orbitron', sans-serif; font-size: 0.6rem; font-weight: 900; color: #fff; text-shadow: 0 0 4px #fff;}

  /* --- DYNAMIC THEMES --- */
  /* DEFAULT IS CYBER BLUE */
  .mod-menu.theme-blue {
    --theme-color: #0052d4; --theme-glow: rgba(0, 168, 255, 0.4); --glow-color: #00e5ff; --grid-color: rgba(0, 168, 255, 0.15);
  }
  /* RESULTS FLASH TO GAME COLORS */
  .mod-menu.theme-green {
    --theme-color: #18b660; --theme-glow: rgba(24, 182, 96, 0.4); --glow-color: #18b660; --grid-color: rgba(24, 182, 96, 0.2);
  }
  .mod-menu.theme-red {
    --theme-color: #ff2846; --theme-glow: rgba(255, 40, 70, 0.4); --glow-color: #ff2846; --grid-color: rgba(255, 40, 70, 0.2);
  }

</style>
</head>
<body>

<iframe src="about:blank" id="gameIframe" class="game-iframe"></iframe>

<div class="floating-logo" id="nscLogo"><span>NSE</span></div>

<!-- DEFAULT IS BLUE THEME -->
<div class="mod-menu theme-blue" id="modMenu">
  
  <div class="header" id="menuHeader">
    <div class="icon-btn">🧊</div>
    <div class="brand-title">NSE⚡ <span>AMIR 𝐇𝐀𝐂𝐊</span></div>
    <div class="icon-btn" style="font-size: 0.75rem;">⚙️</div>
  </div>

  <!-- VIEW 1: AUTHENTICATION -->
  <div class="view-container active" id="authView">
    <div class="auth-view">
      <div class="terminal-text" id="termText">> SYSTEM LOCKED.<br>> AWAITING VIP KEY...</div>
      <input type="text" id="uidInput" class="uid-input" placeholder="XXXX-XXXX" autocomplete="off">
      <button class="btn-login" onclick="verifyUID()">INITIATE ACCESS</button>
      <div class="auth-msg" id="authMsg"></div>
    </div>
  </div>

  <!-- VIEW 2: MAIN TOOL -->
  <div class="view-container" id="mainView">
    <div class="status-bar">
      <div class="status-item"><div class="live-dot"></div> <span id="liveTime">00:00:00</span></div>
      <div class="status-item">MOD : ON</div>
      <div class="status-item" id="pingStatus">PING : 43MS</div>
    </div>

    <div class="main-display">
      <div class="circle-row">
        <div class="circle-wrap"><div class="circle"><span class="circle-num" id="num1">-</span></div></div>
        <div class="circle-wrap"><div class="circle"><span class="circle-num" id="num2">-</span></div></div>
      </div>
      <div class="size-pill">
        <div class="dot"></div>
        <div class="size-text" id="sizeText">STANDBY</div>
        <div class="dot"></div>
      </div>
      <div class="seq-box">SEQ NO : <span id="seqNo">-----</span></div>
    </div>

    <div class="btn-row">
      <button class="btn btn-again" id="btnAgain" onclick="triggerHack()">AGAIN</button>
      <button class="btn btn-hide" id="btnHideMenu">HIDE</button>
    </div>
  </div>

</div>

<!-- FIREBASE SDK -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";
  import { getDatabase, ref, get, update, onValue } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-database.js";

  function vibrate(ms) { if (navigator.vibrate) navigator.vibrate(ms); }

  const firebaseConfig = {
    apiKey: "AIzaSyBFdvXN8SAy77EDQp5HNykO5z2Wa0W8sb0",
    authDomain: "bdgrocky.firebaseapp.com",
    databaseURL: "https://bdgrocky-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "bdgrocky",
    storageBucket: "bdgrocky.firebasestorage.app",
    messagingSenderId: "527135073335",
    appId: "1:527135073335:web:d293fc9570df64a5a54bb2"
  };

  let db;
  try {
    const app = initializeApp(firebaseConfig);
    db = getDatabase(app);
  } catch(e) {
    document.getElementById('termText').innerHTML = "> ERROR: DB FAILED.<br>> CHECK CONFIG.";
    document.getElementById('termText').style.color = "#ff3366";
  }

  let myDeviceId = localStorage.getItem('nse_device_id');
  if(!myDeviceId) {
    myDeviceId = 'DEV-' + Math.random().toString(36).substr(2, 9);
    localStorage.setItem('nse_device_id', myDeviceId);
  }

  let isMenuUnlocked = false;
  let currentUserUID = null;

  window.verifyUID = async function() {
    vibrate(30);
    const uid = document.getElementById('uidInput').value.trim();
    const msg = document.getElementById('authMsg');
    const term = document.getElementById('termText');
    
    if(!uid) { msg.innerText = "KEY REQUIRED!"; vibrate([50, 50, 50]); return; }
    
    term.innerHTML = `> QUERYING DATABASE...<br>> CHECKING KEY: ${uid}`;
    msg.innerText = "";
    
    try {
      const userRef = ref(db, 'users/' + uid);
      const snapshot = await get(userRef);
      
      if(snapshot.exists()) {
        const userData = snapshot.val();
        const now = Date.now();

        if(userData.status !== "approved") {
          term.innerHTML = "> ACCESS DENIED.<br>> BLOCKED BY ADMIN."; term.style.color = "#ff3366"; vibrate([100, 50, 100]); return;
        }
        if(userData.expiry < now) {
          term.innerHTML = "> ACCESS DENIED.<br>> KEY HAS EXPIRED."; term.style.color = "#ff3366"; vibrate([100, 50, 100]); return;
        }

        if(!userData.deviceId || userData.deviceId === "") {
          await update(userRef, { deviceId: myDeviceId });
        } else if (userData.deviceId !== myDeviceId) {
          term.innerHTML = "> ACCESS DENIED.<br>> BOUND TO ANOTHER DEVICE."; term.style.color = "#ff3366"; vibrate([100, 50, 100]); return;
        }

        term.innerHTML = "> ACCESS GRANTED.<br>> WELCOME TO VIP SYSTEM.";
        term.style.color = "#00e5ff";
        vibrate(100);
        
        setTimeout(() => {
            currentUserUID = uid;
            isMenuUnlocked = true;
            document.getElementById('authView').classList.remove('active');
            document.getElementById('mainView').classList.add('active');
            setInterval(checkExpiry, 60000);
        }, 1000);
        
      } else {
        term.innerHTML = "> ACCESS DENIED.<br>> INVALID KEY DETECTED."; term.style.color = "#ff3366"; vibrate([100, 50, 100]);
      }
    } catch(err) {
      term.innerHTML = "> NETWORK ERROR.<br>> CHECK FIREBASE."; term.style.color = "#ff3366";
    }
  };

  function checkExpiry() {
    if(!currentUserUID) return;
    get(ref(db, 'users/' + currentUserUID)).then(snap => {
        if(snap.exists() && snap.val().expiry < Date.now()) {
            alert("VIP Session Expired!"); location.reload();
        }
    });
  }

  onValue(ref(db, 'settings'), (snapshot) => {
    const settings = snapshot.val();
    if(settings && settings.gameLink && document.getElementById('gameIframe').src !== settings.gameLink) {
        document.getElementById('gameIframe').src = settings.gameLink;
    }
  });

  let currentPeriod = "-----";
  const modMenu = document.getElementById('modMenu');
  const num1 = document.getElementById('num1');
  const num2 = document.getElementById('num2');
  const sizeText = document.getElementById('sizeText');
  const seqNo = document.getElementById('seqNo');
  const btnAgain = document.getElementById('btnAgain');

  setInterval(() => {
      const d = new Date();
      document.getElementById('liveTime').innerText = d.toLocaleTimeString('en-US', { hour12: false });
      if(isMenuUnlocked && Math.random() > 0.5) {
          document.getElementById('pingStatus').innerText = "PING : " + (Math.floor(Math.random() * 30) + 35) + "MS";
      }
  }, 1000);

  async function syncServer() {
    if(!isMenuUnlocked) return;
    try {
      const res = await fetch("https://draw.ar-lottery01.com/WinGo/WinGo_1M/GetHistoryIssuePage.json");
      const json = await res.json();
      const latestDraw = json.data.list[0];
      const nextIssue = (BigInt(latestDraw.issueNumber) + 1n).toString();
      currentPeriod = nextIssue.slice(-5);
      if(btnAgain.innerText === "AGAIN") seqNo.innerText = currentPeriod;
    } catch(e) {}
  }
  setInterval(syncServer, 3000);

  window.triggerHack = function() {
    if(currentPeriod === "-----") return;
    vibrate(30);
    
    btnAgain.innerText = "WAIT...";
    btnAgain.style.pointerEvents = "none";
    
    // Switch to BLUE theme while processing
    modMenu.className = "mod-menu theme-blue";
    
    num1.classList.add('motion-blur');
    num2.classList.add('motion-blur');
    
    let interval = setInterval(() => {
      num1.innerText = Math.floor(Math.random() * 10);
      num2.innerText = Math.floor(Math.random() * 10);
      sizeText.innerText = Math.random() > 0.5 ? "DECODING" : "HACKING";
      vibrate(10);
    }, 80);

    setTimeout(() => {
      clearInterval(interval);
      finalizePrediction();
    }, 2500);
  }

  function finalizePrediction() {
    num1.classList.remove('motion-blur');
    num2.classList.remove('motion-blur');

    let pSize = Math.random() > 0.5 ? "BIG" : "SMALL";
    const pool = pSize === "BIG" ? [5,6,7,8,9] : [0,1,2,3,4];
    
    const r1 = pool[Math.floor(Math.random()*pool.length)];
    let r2 = pool[Math.floor(Math.random()*pool.length)];
    while(r1 === r2) r2 = pool[Math.floor(Math.random()*pool.length)];

    num1.innerText = r1;
    num2.innerText = r2;
    sizeText.innerText = pSize;
    seqNo.innerText = currentPeriod;

    // Apply Red/Green ONLY for the final result
    if(pSize === "BIG") {
        modMenu.className = "mod-menu theme-red";
        vibrate([80, 40, 80]);
    } else {
        modMenu.className = "mod-menu theme-green";
        vibrate([80, 40, 80]);
    }

    btnAgain.innerText = "AGAIN";
    btnAgain.style.pointerEvents = "auto";
  }

  // --- ZERO-LAG QUANTUM DRAG ENGINE ---
  function initQuantumDrag(element, handle, clickCb) {
    let startX = 0, startY = 0, initialTop = 0, initialLeft = 0;
    let isDragging = false, hasMoved = false;

    const startDrag = (e) => {
      if(e.target.closest('.btn-hide') || e.target.closest('.btn-again') || e.target.closest('.btn-login') || e.target.tagName === 'INPUT') return;
      
      let clientX = e.type.includes('touch') ? e.touches[0].clientX : e.clientX;
      let clientY = e.type.includes('touch') ? e.touches[0].clientY : e.clientY;

      startX = clientX; startY = clientY;
      initialTop = element.offsetTop; initialLeft = element.offsetLeft;
      isDragging = true; hasMoved = false;

      document.addEventListener('mousemove', doDrag, { passive: false });
      document.addEventListener('touchmove', doDrag, { passive: false });
      document.addEventListener('mouseup', stopDrag);
      document.addEventListener('touchend', stopDrag);
    };

    const doDrag = (e) => {
      if (!isDragging) return;
      let clientX = e.type.includes('touch') ? e.touches[0].clientX : e.clientX;
      let clientY = e.type.includes('touch') ? e.touches[0].clientY : e.clientY;

      let deltaX = clientX - startX, deltaY = clientY - startY;
      if (Math.abs(deltaX) > 3 || Math.abs(deltaY) > 3) hasMoved = true;

      if (hasMoved) {
          e.preventDefault(); 
          let newTop = initialTop + deltaY, newLeft = initialLeft + deltaX;
          const maxLeft = window.innerWidth - element.offsetWidth;
          const maxTop = window.innerHeight - element.offsetHeight;

          if(newLeft < 0) newLeft = 0; if(newTop < 0) newTop = 0;
          if(newLeft > maxLeft) newLeft = maxLeft; if(newTop > maxTop) newTop = maxTop;

          element.style.top = newTop + "px"; element.style.left = newLeft + "px";
      }
    };

    const stopDrag = () => {
      isDragging = false;
      document.removeEventListener('mousemove', doDrag); document.removeEventListener('touchmove', doDrag);
      document.removeEventListener('mouseup', stopDrag); document.removeEventListener('touchend', stopDrag);
      if (!hasMoved && clickCb) clickCb();
    };

    handle.addEventListener('mousedown', startDrag);
    handle.addEventListener('touchstart', startDrag, { passive: false });
  }

  const nscLogo = document.getElementById('nscLogo');
  initQuantumDrag(modMenu, document.getElementById('menuHeader'), null);
  initQuantumDrag(nscLogo, nscLogo, () => {
    vibrate(20);
    modMenu.style.top = nscLogo.style.top; modMenu.style.left = nscLogo.style.left;
    nscLogo.style.display = 'none'; modMenu.style.display = 'flex';
    // Revert to Blue Theme when opening menu again before next result
    if (btnAgain.innerText !== "WAIT...") modMenu.className = "mod-menu theme-blue";
  });

  document.getElementById('btnHideMenu').onclick = () => {
    vibrate(20);
    nscLogo.style.top = modMenu.style.top; nscLogo.style.left = modMenu.style.left;
    modMenu.style.display = 'none'; nscLogo.style.display = 'flex';
  };

</script>
</body>
</html>
