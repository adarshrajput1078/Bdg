<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>13L PDF TOOL BY ROCKY</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Poppins:wght@400;600;800&display=swap');
        
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; font-family: 'Poppins', sans-serif; background-color: #000; overflow: hidden; }
        
        #gameIframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; z-index: 1; }
        
        /* FLOATING ICON */
        #modIcon { position: absolute; top: 20%; left: 10px; width: 45px; height: 45px; background: rgba(10, 10, 15, 0.9); border: 2px solid #00ffcc; border-radius: 50%; display: flex; justify-content: center; align-items: center; z-index: 60; cursor: pointer; box-shadow: 0 0 15px rgba(0, 255, 204, 0.5), inset 0 0 10px rgba(0, 255, 204, 0.2); transition: transform 0.2s; touch-action: none; }
        #modIcon:active { transform: scale(0.9); }
        .icon-text { color: #00ffcc; font-family: 'Orbitron', sans-serif; font-size: 16px; font-weight: 900; text-shadow: 0 0 8px #00ffcc; pointer-events: none;}
        
        /* FULL WIDGET MENU */
        #floatingTool { position: absolute; top: 15%; left: calc(50vw - 160px); width: 320px; z-index: 50; background: rgba(10, 10, 15, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(0, 255, 204, 0.4); border-radius: 10px; box-shadow: 0 15px 35px rgba(0,0,0,0.8), 0 0 15px rgba(0, 255, 204, 0.1); display: none; flex-direction: column; overflow: hidden; }
        
        #dragHandle { background: linear-gradient(90deg, #111, #1a2b25, #111); padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; cursor: grab; border-bottom: 1px solid rgba(0, 255, 204, 0.2); touch-action: none; }
        #dragHandle:active { cursor: grabbing; }
        .handle-title { color: #00ffcc; font-family: 'Orbitron', sans-serif; font-size: 13px; font-weight: 900; letter-spacing: 1px; pointer-events: none; text-shadow: 0 0 5px #00ffcc;}
        .handle-title span { color: #fff; text-shadow: none; }
        .btn-mini { background: transparent; border: none; color: #ff2a2a; font-weight: 900; cursor: pointer; padding: 0 5px; font-size: 16px; transition: 0.2s; font-family: 'Orbitron', sans-serif;}
        .btn-mini:hover { text-shadow: 0 0 10px #ff2a2a; transform: scale(1.1);}
        
        #widgetBody { padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        
        .info-row { display: flex; justify-content: space-between; font-family: 'Orbitron', sans-serif; font-size: 10px; background: rgba(0, 255, 204, 0.1); padding: 6px 10px; border-radius: 4px; border: 1px solid rgba(0, 255, 204, 0.3); }
        .info-row span { color: #00ffcc; font-weight: bold; }
        
        .input-row { display: flex; gap: 8px; }
        input { flex: 1; padding: 10px; border: 1px solid #333; border-radius: 6px; text-align: center; font-size: 12px; font-family: 'Orbitron', sans-serif; background: rgba(0, 0, 0, 0.8); color: #00ffcc; outline: none; transition: 0.2s; }
        input:focus { border-color: #00ffcc; box-shadow: 0 0 10px rgba(0, 255, 204, 0.4); }
        
        button.action-btn { padding: 10px; font-size: 12px; font-family: 'Orbitron', sans-serif; font-weight: 800; cursor: pointer; border-radius: 6px; border: 1px solid #00ffcc; background: #00ffcc; color: #000; text-transform: uppercase; transition: 0.2s; }
        button.action-btn:active { transform: scale(0.95); }
        button.action-btn:disabled { background: #444; border-color: #555; color: #888; cursor: not-allowed;}
        
        .result-box { text-align: center; font-family: 'Orbitron', sans-serif; font-size: 16px; font-weight: 900; color: #666; background: #0a0a0a; padding: 8px; border-radius: 6px; border: 1px dashed #333; letter-spacing: 1px; }

        .auth-container h3 { margin: 0 0 10px 0; font-family: 'Orbitron', sans-serif; font-size: 15px; color: #fff; text-align: center;}
        .auth-container h3 span { color: #00ffcc; text-shadow: 0 0 10px #00ffcc; }

        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 1000; display: none; justify-content: center; align-items: center; backdrop-filter: blur(5px); }
        .modal-box { background: #111; border: 2px solid #ffd700; padding: 20px; border-radius: 10px; text-align: center; width: 85%; max-width: 320px; box-shadow: 0 0 30px rgba(255, 215, 0, 0.2); animation: popIn 0.3s ease-out; }
        .modal-box h4 { color: #ffd700; font-family: 'Orbitron', sans-serif; margin: 0 0 10px 0; font-size: 16px; }
        .modal-box p { font-size: 11px; color: #ccc; margin-bottom: 15px; line-height: 1.5; }
        .btn-close { background: transparent; border: 1px solid #fff; color: #fff; padding: 8px 15px; border-radius: 4px; font-family: 'Orbitron', sans-serif; font-weight: bold; font-size: 10px; cursor: pointer;}
        .btn-urgent { background: #ff2a2a; border: 1px solid #ff2a2a; color: #fff; padding: 8px 15px; border-radius: 4px; font-family: 'Orbitron', sans-serif; font-weight: bold; font-size: 10px; cursor: pointer; animation: pulseRed 1.5s infinite; }

        /* WIN ANIMATION */
        #winScreen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(5, 0, 0, 0.95); z-index: 9999; display: none; flex-direction: column; justify-content: center; align-items: center; overflow: hidden; }
        .fire-bg { position: absolute; width: 200%; height: 200%; background: radial-gradient(circle, rgba(255,80,0,0.4) 0%, rgba(0,0,0,0) 60%); animation: fireSpin 4s linear infinite; z-index: -1; }
        .win-title { font-family: 'Orbitron', sans-serif; font-size: 45px; font-weight: 900; color: #ffeb3b; text-shadow: 0 0 20px #ff9800, 0 0 40px #ff2a2a; margin: 0; animation: winZoom 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards, pulseGold 1.5s infinite alternate; }
        .win-details { background: rgba(0,0,0,0.7); border: 2px solid #00ffcc; padding: 20px 40px; border-radius: 12px; margin-top: 20px; text-align: center; box-shadow: 0 0 40px rgba(0, 255, 204, 0.4); animation: slideUp 0.8s ease-out forwards; }
        .win-details p { margin: 5px 0; font-family: 'Poppins', sans-serif; font-weight: bold; font-size: 16px; color: #fff; letter-spacing: 1px;}
        .win-details span { color: #00ffcc; font-family: 'Orbitron', sans-serif; font-size: 24px; text-shadow: 0 0 15px #00ffcc;}

        @keyframes popIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        @keyframes pulseRed { 0% { box-shadow: 0 0 5px #ff2a2a; } 50% { box-shadow: 0 0 20px #ff2a2a; } 100% { box-shadow: 0 0 5px #ff2a2a; } }
        @keyframes fireSpin { 0% { transform: rotate(0deg) scale(1); } 50% { transform: rotate(180deg) scale(1.1); } 100% { transform: rotate(360deg) scale(1); } }
        @keyframes winZoom { 0% { transform: scale(0); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        @keyframes pulseGold { 0% { text-shadow: 0 0 10px #ff9800; } 100% { text-shadow: 0 0 30px #ffeb3b, 0 0 50px #ff2a2a; } }
        @keyframes slideUp { 0% { transform: translateY(50px); opacity: 0; } 100% { transform: translateY(0); opacity: 1; } }
        
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <iframe id="gameIframe" src="https://sikkimgg.com/#/register?invitationCode=481415207260"></iframe>

    <div id="modIcon" onclick="openMenu()">
        <div class="icon-text">AI</div>
    </div>

    <div id="floatingTool">
        <div id="dragHandle">
            <div class="handle-title">13L <span>AI MOD</span></div>
            <button class="btn-mini" onclick="closeMenu()">X</button>
        </div>
        
        <div id="widgetBody">
            <div id="authScreen" class="auth-container">
                <h3>SYSTEM <span>LOGIN</span></h3>
                <div class="input-row">
                    <input type="number" id="uidInput" placeholder="ENTER UID">
                    <button class="action-btn" id="authBtn" onclick="checkUID()" style="width: 40%;">VERIFY</button>
                </div>
            </div>

            <div id="toolScreen" class="hidden">
                <div class="info-row">
                    <div>ID: <span id="displayPeriod">SYNCING...</span></div>
                    <div>TMR: <span id="displayTimer" style="color:#ff2a2a;">00:00</span></div>
                </div>
                <div class="input-row" style="margin-top: 10px;">
                    <input type="number" id="num1" placeholder="N-1" min="0" max="9">
                    <input type="number" id="num2" placeholder="N-2" min="0" max="9">
                    <button class="action-btn" id="analyzeBtn" onclick="runExploit()" style="width: 35%;">HACK</button>
                </div>
                <div id="predictionDisplay" class="result-box" style="margin-top: 10px;">AWAITING DATA...</div>
            </div>
        </div>
    </div>

    <div id="uidModal" class="modal-overlay">
        <div class="modal-box">
            <h4 id="modalTitle">UID NOT FOUND</h4>
            <p id="modalMsg">System error message here.</p>
            <button id="modalActionBtn" class="btn-close" onclick="closeModal()">OKAY</button>
        </div>
    </div>

    <div id="winScreen">
        <div class="fire-bg"></div>
        <h1 class="win-title">WINNER!</h1>
        <div class="win-details">
            <p>PERIOD: <span id="winPeriod" style="color: #ffeb3b;">12345678</span></p>
            <p>RESULT: <span id="winResult">BIG [8]</span></p>
        </div>
        <p style="font-size: 11px; color: #888; margin-top: 30px; cursor: pointer;" onclick="document.getElementById('winScreen').style.display='none'">[Tap anywhere to close]</p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, get, set, update, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAGQ8iW7GaYtDINwkfismc_7uBw2zF7V70",
            authDomain: "l-rocky.firebaseapp.com",
            databaseURL: "https://l-rocky-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "l-rocky",
            storageBucket: "l-rocky.firebasestorage.app",
            messagingSenderId: "524361045191",
            appId: "1:524361045191:web:1576f60a76f89c01c2dae2"
        };
        const db = getDatabase(initializeApp(firebaseConfig));

        let currentUID = "";
        const URGENT_COOLDOWN_HOURS = 3;

        // UI Logic
        const modIcon = document.getElementById('modIcon');
        const floatingTool = document.getElementById('floatingTool');
        window.openMenu = () => { modIcon.style.display = 'none'; floatingTool.style.display = 'flex'; };
        window.closeMenu = () => { floatingTool.style.display = 'none'; modIcon.style.display = 'flex'; };

        function makeDraggable(element, handleElement) {
            let isDragging = false, startX, startY, initialLeft, initialTop;
            const dragStart = (e) => {
                if (e.target.tagName.toLowerCase() === 'button') return; 
                isDragging = true;
                let event = e.type.includes('mouse') ? e : e.touches[0];
                startX = event.clientX; startY = event.clientY;
                initialLeft = element.offsetLeft; initialTop = element.offsetTop;
                document.body.style.userSelect = 'none';
            };
            const dragAction = (e) => {
                if (!isDragging) return; e.preventDefault();
                let event = e.type.includes('mouse') ? e : e.touches[0];
                let dx = event.clientX - startX; let dy = event.clientY - startY;
                element.style.left = `${initialLeft + dx}px`; element.style.top = `${initialTop + dy}px`;
            };
            const dragEnd = () => { isDragging = false; document.body.style.userSelect = 'auto'; };
            handleElement.addEventListener('mousedown', dragStart); handleElement.addEventListener('touchstart', dragStart, {passive: false});
            document.addEventListener('mousemove', dragAction); document.addEventListener('touchmove', dragAction, {passive: false});
            document.addEventListener('mouseup', dragEnd); document.addEventListener('touchend', dragEnd);
        }
        makeDraggable(modIcon, modIcon); makeDraggable(floatingTool, document.getElementById('dragHandle'));

        // Settings Listeners
        onValue(ref(db, 'settings/active_link'), (snapshot) => { 
            if (snapshot.exists() && snapshot.val().trim() !== "") document.getElementById('gameIframe').src = snapshot.val().trim(); 
        });

        onValue(ref(db, 'settings/maintenance'), (snapshot) => {
            if (snapshot.exists() && snapshot.val() === true) {
                document.body.innerHTML = `
                    <div style="height: 100vh; width: 100vw; background: #000; display: flex; flex-direction: column; justify-content: center; align-items: center; color: #ff2a2a; font-family: 'Orbitron', sans-serif;">
                        <h1 style="font-size: 40px; text-shadow: 0 0 20px #ff2a2a;">🛑 SYSTEM HALTED</h1>
                        <p style="color: #888;">Developer has initiated a server shutdown.</p>
                    </div>`;
            }
        });

        // UID Logic
        function showModal(title, msg, isUrgent = false) {
            document.getElementById('modalTitle').innerText = title; document.getElementById('modalMsg').innerHTML = msg;
            let btn = document.getElementById('modalActionBtn');
            if(isUrgent) { btn.className = "btn-urgent"; btn.innerText = "🚨 MARK URGENT"; btn.onclick = markUrgent; } 
            else { btn.className = "btn-close"; btn.innerText = "OKAY"; btn.onclick = closeModal; }
            document.getElementById('uidModal').style.display = 'flex';
        }
        window.closeModal = () => { document.getElementById('uidModal').style.display = 'none'; };

        window.checkUID = async () => {
            let uid = document.getElementById('uidInput').value.trim(); if(!uid) return alert("ENTER UID!");
            currentUID = uid; let btn = document.getElementById('authBtn'); btn.innerText = "WAIT..."; btn.disabled = true;
            try {
                let approvedSnap = await get(ref(db, 'approved_uids/' + uid));
                if(approvedSnap.exists()) {
                    document.getElementById('authScreen').classList.add('hidden'); document.getElementById('toolScreen').classList.remove('hidden'); startPeriodTimer(); return;
                }
                let pendingSnap = await get(ref(db, 'pending_requests/' + uid));
                if(pendingSnap.exists()) {
                    let data = pendingSnap.val(); btn.innerText = "VERIFY"; btn.disabled = false;
                    let hoursPassed = (Date.now() - (data.last_urgent_time || 0)) / (1000 * 60 * 60);
                    if(hoursPassed >= URGENT_COOLDOWN_HOURS) showModal("VERIFICATION DELAYED", "3 ghante se zyada ho chuke hain. Aap apni request ko URGENT mark kar sakte hain.", true);
                    else showModal("VERIFICATION PENDING", `Aapka UID verification queue mein hai.<br><br><b>Urgent option unlocks in: ${Math.ceil(URGENT_COOLDOWN_HOURS - hoursPassed)} Hours</b>`);
                    return;
                }
                await set(ref(db, 'pending_requests/' + uid), { uid: uid, timestamp: Date.now(), is_urgent: false, last_urgent_time: 0 });
                btn.innerText = "VERIFY"; btn.disabled = false;
                showModal("REQUEST SUBMITTED", "Aapka UID system mein nahi hai. Humne verification ke liye aage bhej diya hai. 3 ghante ke andar verification complete ho jayega.");
            } catch (error) { btn.innerText = "VERIFY"; btn.disabled = false; alert("Network Error"); }
        };

        window.markUrgent = async () => {
            await update(ref(db, 'pending_requests/' + currentUID), { is_urgent: true, last_urgent_time: Date.now() });
            showModal("URGENT SENT", "Admin ko urgent ping bhej diya gaya hai!");
            document.getElementById('modalActionBtn').className = "btn-close"; document.getElementById('modalActionBtn').innerText = "OKAY"; document.getElementById('modalActionBtn').onclick = closeModal;
        };

        // Tool Timer & Hacks
        let currentPeriod = "";
        function startPeriodTimer() {
            setInterval(() => {
                let now = new Date(); let mins = now.getUTCMinutes(); let hrs = now.getUTCHours();
                currentPeriod = `${now.getUTCFullYear()}${String(now.getUTCMonth()+1).padStart(2,'0')}${String(now.getUTCDate()).padStart(2,'0')}1000${10001 + (hrs * 60) + mins}`;
                let remSec = 60 - now.getUTCSeconds(); if(remSec === 60) remSec = 0;
                document.getElementById('displayPeriod').innerText = currentPeriod; document.getElementById('displayTimer').innerText = `00:${String(remSec).padStart(2,'0')}`;
            }, 1000);
        }

        window.runExploit = async () => {
            let n1 = document.getElementById('num1').value; let n2 = document.getElementById('num2').value;
            let resDisplay = document.getElementById('predictionDisplay'); let btn = document.getElementById('analyzeBtn');
            if(n1 === "" || n2 === "") return alert("INPUT REQUIRED");
            btn.disabled = true; btn.innerText = "..."; resDisplay.innerText = "HACKING..."; resDisplay.style.color = "#888";
            try {
                const pSnap = await get(ref(db, `patterns/${n1}-${n2}`)); 
                setTimeout(() => {
                    btn.disabled = false; btn.innerText = "HACK";
                    if(pSnap.exists()) { resDisplay.innerText = pSnap.val(); resDisplay.style.color = "#00ffcc"; } 
                    else { resDisplay.innerText = "NOT FOUND"; resDisplay.style.color = "#ff2a2a"; }
                }, 1500); 
            } catch (e) { btn.disabled = false; }
        };

        // Global Win Listener
        let lastWinTime = 0;
        onValue(ref(db, 'live_events/win_trigger'), (snapshot) => {
            if (snapshot.exists()) {
                let data = snapshot.val();
                if (Date.now() - data.timestamp < 15000 && data.timestamp > lastWinTime) {
                    lastWinTime = data.timestamp;
                    document.getElementById('winPeriod').innerText = data.period;
                    document.getElementById('winResult').innerText = data.result;
                    let winScreen = document.getElementById('winScreen');
                    winScreen.style.display = 'flex';
                    setTimeout(() => { winScreen.style.display = 'none'; }, 6000);
                }
            }
        });
    </script>
</body>
</html>
